{% extends 'base.html' %}

{% block title %}Contact Form - Loan Tracker{% endblock %}

{% block content %}
    <h1>{% if object %}Edit Contact{% else %}Add Contact{% endif %}</h1>
    <form method="post">
        {% csrf_token %}
        {{ form.as_p }}
        <button type="submit">Save</button>
        <a href="{% url 'contact_list' %}">Cancel</a>
    </form>
{% endblock %}
