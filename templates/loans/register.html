{% extends 'base.html' %}

{% block auth_content %}
<div class="auth-card">
    <div class="auth-logo">
        <i class="bi bi-currency-dollar"></i>
        LoanTracker
    </div>
    <h5 class="mb-4 text-center fw-semibold">Welcome Back</h5>
    <form method="post">
        {% csrf_token %}
        {% for field in form %}
            <div class="mb-3">
                <label class="form-label">{{ field.label }}</label>
                {{ field }}
                {% if field.errors %}
                    <div class="text-danger small mt-1">{{ field.errors.0 }}</div>
                {% endif %}
            </div>
        {% endfor %}
        <button type="submit" class="btn btn-primary w-100 mt-2">Login</button>
    </form>
    <p class="text-center mt-3 small">No account? <a href="{% url 'register' %}" style="color: var(--primary)">Register</a></p>
</div>
{% endblock %}
