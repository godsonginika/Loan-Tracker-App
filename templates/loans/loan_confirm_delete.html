{% extends 'base.html' %}

{% block title %}Delete Loan - Loan Tracker{% endblock %}

{% block content %}
    <h1>Delete this loan?</h1>
    <p>Are you sure you want to delete this loan with {{ object.contact.name }}? This will also delete all its payments.</p>
    <form method="post">
        {% csrf_token %}
        <button type="submit">Yes, Delete</button>
        <a href="{% url 'loan_list' %}">Cancel</a>
    </form>
{% endblock %}
