{% extends 'base.html' %}

{% block title %}Loan Form - Loan Tracker{% endblock %}

{% block content %}
    <h1>{% if object %}Edit Loan{% else %}Add Loan{% endif %}</h1>
    <form method="post">
        {% csrf_token %}
        {{ form.as_p }}
        <button type="submit">Save</button>
        <a href="{% url 'loan_list' %}">Cancel</a>
    </form>
{% endblock %}
