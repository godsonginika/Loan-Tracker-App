{% extends 'base.html' %}

{% block title %}Delete Payment - Loan Tracker{% endblock %}

{% block content %}
    <h1>Delete this payment?</h1>
    <p>Are you sure you want to delete this payment of {{ object.amount }}?</p>
    <form method="post">
        {% csrf_token %}
        <button type="submit">Yes, Delete</button>
        <a href="{% url 'loan_detail' object.loan.pk %}">Cancel</a>
    </form>
{% endblock %}
