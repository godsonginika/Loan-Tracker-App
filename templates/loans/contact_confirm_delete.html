{% extends 'base.html' %}

{% block title %}Delete Contact - Loan Tracker{% endblock %}

{% block content %}
    <h1>Delete {{ object.name }}?</h1>
    <p>Are you sure you want to delete this contact? This will also delete all their loans and payments.</p>
    <form method="post">
        {% csrf_token %}
        <button type="submit">Yes, Delete</button>
        <a href="{% url 'contact_list' %}">Cancel</a>
    </form>
{% endblock %}
